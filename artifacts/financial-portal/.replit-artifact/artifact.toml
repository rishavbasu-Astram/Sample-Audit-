kind = "web"
previewPath = "/"
title = "Astram Financial Portal"
version = "1.0.0"
id = "artifacts/financial-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20844

[services.development]
run = "pnpm --filter @workspace/financial-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financial-portal", "run", "build" ]
publicDir = "artifacts/financial-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20844"
BASE_PATH = "/"
