<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Financial Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); border-right: 3px solid #3b82f6; }
        .card-hover { transition: all 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col transition-all duration-300">

                    </div>
                    <div>
                        <h1 class="font-bold text-lg text-slate-900 leading-tight">FinManage</h1>

                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1">
                <button onclick="navigateTo('dashboard')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium" data-page="dashboard">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Dashboard</span>
                </button>
                <button onclick="navigateTo('cashflow')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600" data-page="cashflow">
                    <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
                    <span>Cash Flow</span>
                </button>
                <button onclick="navigateTo('invoicing')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600" data-page="invoicing">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span>Invoicing</span>
                </button>
                <button onclick="navigateTo('ledger')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600" data-page="ledger">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span>General Ledger</span>
                </button>
                <button onclick="navigateTo('audit')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600" data-page="audit">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    <span>Audit & Compliance</span>
                </button>
                <button onclick="navigateTo('reports')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600" data-page="reports">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    <span>Reports & Analytics</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-200">
                <div class="flex items-center gap-3 px-4 py-3 rounded-lg bg-slate-50">
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                        <span class="text-sm font-semibold text-blue-700">MR</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-slate-900 truncate">Michael Roberts</p>
                        <p class="text-xs text-slate-500">CFO</p>
                    </div>
                    <button onclick="logout()" class="text-slate-400 hover:text-slate-600">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="page-title" class="text-2xl font-bold text-slate-900">Dashboard</h2>
                        <p id="page-subtitle" class="text-sm text-slate-500 mt-1">Real-time financial overview</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="relative p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-slate-100">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            New Transaction
                        </button>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div id="content" class="p-8">
                <!-- Content injected by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto fade-in"></div>
        </div>
    </div>

        function formatCurrency(amount, currency = 'USD') {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency, maximumFractionDigits: 0 }).format(amount);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getStatusColor(status) {
            const colors = {
                paid: 'bg-emerald-100 text-emerald-800',
                sent: 'bg-blue-100 text-blue-800',
                draft: 'bg-slate-100 text-slate-800',
                overdue: 'bg-red-100 text-red-800',
                posted: 'bg-emerald-100 text-emerald-800',
                compliant: 'bg-emerald-100 text-emerald-800',
                partial: 'bg-amber-100 text-amber-800',
                pending: 'bg-amber-100 text-amber-800',
                cleared: 'bg-blue-100 text-blue-800',
                reconciled: 'bg-emerald-100 text-emerald-800'
            };
            return colors[status] || 'bg-slate-100 text-slate-800';
        }

        function daysOverdue(dueDate) {
            const due = new Date(dueDate);
            const today = new Date();
            const diff = Math.floor((today - due) / (1000 * 60 * 60 * 24));
            return diff > 0 ? diff : 0;
        }

        // ==================== NAVIGATION ====================
        function navigateTo(page) {
            currentPage = page;

            // Update sidebar
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
                item.classList.add('text-slate-600');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                    item.classList.remove('text-slate-600');
                }
            });

            // Update header
            const titles = {
                dashboard: { title: 'Dashboard', subtitle: 'Real-time financial overview' },
                cashflow: { title: 'Cash Flow Management', subtitle: 'Track AR/AP and forecast liquidity' },
                invoicing: { title: 'Invoicing & Billing', subtitle: 'Manage invoices and recurring billing' },
                ledger: { title: 'General Ledger', subtitle: 'Double-entry bookkeeping and journal entries' },
                audit: { title: 'Audit & Compliance', subtitle: 'Immutable trails and regulatory controls' },
                reports: { title: 'Reports & Analytics', subtitle: 'Financial statements and variance analysis' }
            };
            document.getElementById('page-title').textContent = titles[page].title;
            document.getElementById('page-subtitle').textContent = titles[page].subtitle;

            // Render content
            renderPage(page);
            lucide.createIcons();
        }

        function renderPage(page) {
            const content = document.getElementById('content');
            content.innerHTML = '';

            switch(page) {
                case 'dashboard': renderDashboard(content); break;
                case 'cashflow': renderCashFlow(content); break;
                case 'invoicing': renderInvoicing(content); break;
                case 'ledger': renderLedger(content); break;
                case 'audit': renderAudit(content); break;
                case 'reports': renderReports(content); break;
            }
        }

                                </div>
                                <span class="text-xs font-medium text-amber-600 bg-amber-50 px-2 py-1 rounded-full">+8.0%</span>
                            </div>

                        </div>
                        <div class="bg-white rounded-xl border border-slate-200 p-6 card-hover">
                            <div class="flex items-center justify-between mb-4">

                            <div class="space-y-3">
                                ${mockData.invoices.filter(i => i.status !== 'paid').map(inv => `

                            <h3 class="text-xl font-bold text-slate-900">${report.title}</h3>
                            <p class="text-sm text-slate-500">${report.subtitle}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="alert('Report exported to PDF')" class="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2">
                                <i data-lucide="download" class="w-4 h-4"></i>
                                Export
                            </button>
                            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    ${report.content}
                </div>
            `);
        }

        function exportAuditLog() {
            alert('Audit log exported to CSV format with SHA-256 integrity hashes.');
        }

        function logout() {
            if (confirm('Are you sure you want to log out?')) {
                alert('Logged out successfully. All session tokens cleared.');
                location.reload();
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            navigateTo('dashboard');
        });
    </script>
</body>
</html>
