openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Astram Financial Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: assets
  - name: customers
  - name: quotes
  - name: sales-orders
  - name: invoices
  - name: sales-receipts
  - name: recurring-invoices
  - name: payment-links
  - name: payments-received
  - name: credit-notes
  - name: vendors
  - name: expenses
  - name: recurring-expenses
  - name: purchase-orders
  - name: bills
  - name: recurring-bills
  - name: payments-made
  - name: vendor-credits
  - name: banking
  - name: journals
  - name: chart-of-accounts
  - name: budgets
  - name: vat-payments
  - name: currency-adjustments
  - name: transaction-locking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Financial dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/cash-flow:
    get:
      operationId: getCashFlow
      tags: [dashboard]
      summary: Cash flow data for charts
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [monthly, quarterly, yearly]
      responses:
        "200":
          description: Cash flow data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashFlowPoint"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent financial activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/ar-aging:
    get:
      operationId: getArAging
