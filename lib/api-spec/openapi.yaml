components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── DASHBOARD ──────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        totalReceivable:
          type: number
        totalPayable:
          type: number
        cashBalance:
          type: number
        overdueInvoices:
          type: integer
        overdueBills:
          type: integer
        totalRevenue:
          type: number
        totalExpenses:
          type: number
        netProfit:
          type: number
        openQuotes:
          type: integer
        openPurchaseOrders:
          type: integer
      required:
        - totalReceivable
        - totalPayable
        - cashBalance
        - overdueInvoices
        - overdueBills
        - totalRevenue
        - totalExpenses
        - netProfit
        - openQuotes
        - openPurchaseOrders

    CashFlowPoint:
      type: object
      properties:
        period:
          type: string
        income:
          type: number
        expenses:
          type: number
        net:
          type: number
      required: [period, income, expenses, net]

    ActivityItem:
      type: object
      properties:
